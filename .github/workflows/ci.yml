name: Pipeline de CI - Engenharia de Software II

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # O Sonar precisa do histórico completo para analisar os commits

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependências
      run: npm ci --ignore-scripts

    # Executa os testes gerando a cobertura exigida de 85% para o professor
    - name: Executar testes com cobertura
      run: npm test -- --coverage
      continue-on-error: true # Evita que o pipeline trave caso vocês ainda estejam criando os testes

    # Dispara a análise do Sonar integrado ao pipeline de forma oficial
    - name: Análise do SonarCloud
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
